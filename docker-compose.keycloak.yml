# Keycloak als Referenz-IdP (self-hosted, OSS) für das OIDC-Login — nur Dev/Test.
# Start:  docker compose -f docker-compose.keycloak.yml up -d
# Admin:  http://localhost:8081  (admin / admin)
# Realm "agency" + Client "agency-os" + Demo-User werden automatisch importiert.
# Issuer für die API:  http://localhost:8081/realms/agency
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
