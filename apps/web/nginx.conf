server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # /api/* intern an den API-Container weiterreichen (Single-Origin → keine CORS/Cookie-Sonderfälle).
  # Funktioniert sowohl hinter Caddy (docker-compose.full) als auch hinter Coolify/Traefik.
  location /api/ {
    proxy_pass http://api:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 320s;
  }

  # index.html NIE cachen — sonst zeigt z. B. die Desktop-App (WKWebView) eine veraltete
  # Version, obwohl längst neu deployt wurde. Gehashte Assets dürfen dagegen lange gecacht werden.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files /index.html =404;
  }
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA-Fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
